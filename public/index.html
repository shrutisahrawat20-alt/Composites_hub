<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HRC+ · Composites Intelligence</title>
  <meta name="description" content="HRC Composites Material Market Intelligence — daily feed across EU, China, USA and global markets."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent:     #D9291C;
      --accent-dim: rgba(217,41,28,0.12);
      --navy:       #0e1a2b;
      --ui:   'IBM Plex Sans', system-ui, sans-serif;
      --serif:'IBM Plex Serif', Georgia, serif;
      --mono: 'IBM Plex Mono', monospace;
    }
    [data-theme="light"] {
      --bg:       #ffffff; --bg-card:#ffffff; --bg-nav:var(--navy);
      --bg-stats:var(--navy); --bg-filter:#ffffff;
      --border:#dde1e8; --border-md:#c8cdd6;
      --text-hi:#0e1a2b; --text-md:#3d4a5c; --text-lo:#7a8799; --text-inv:#ffffff;
      --shadow-card:0 1px 3px rgba(14,26,43,.07),0 4px 12px rgba(14,26,43,.04);
      --shadow-lift:0 4px 16px rgba(14,26,43,.12),0 1px 4px rgba(14,26,43,.06);
    }
    [data-theme="light"] {
      --bg:#0a0d14; --bg-card:#111827; --bg-nav:#060a10;
      --bg-stats:#060a10; --bg-filter:#111827;
      --border:#1e2a3a; --border-md:#2a3a50;
      --text-hi:#e8edf4; --text-md:#8fa3ba; --text-lo:#4d6078; --text-inv:#ffffff;
      --shadow-card:0 1px 3px rgba(0,0,0,.4);
      --shadow-lift:0 4px 20px rgba(0,0,0,.5);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:14px;scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text-hi);font-family:var(--ui);line-height:1.6;min-height:100vh;transition:background .25s,color .25s;}
    a{color:inherit;text-decoration:none;}
    button{font-family:var(--ui);cursor:pointer;}

    /* NAV */
    .nav{position:sticky;top:0;z-index:200;background:var(--bg-nav);border-bottom:1px solid rgba(255,255,255,.06);height:52px;}
    .nav-inner{max-width:1440px;margin:0 auto;padding:0 1.5rem;height:100%;display:flex;align-items:center;gap:0;}
    .logo{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-right:2rem;}
    .logo-mark{width:38px;height:28px;}
    .logo-wordmark{font-size:13px;font-weight:600;letter-spacing:.08em;color:#fff;text-transform:uppercase;}
    .logo-sub{font-size:9px;font-weight:400;letter-spacing:.12em;color:rgba(255,255,255,.4);text-transform:uppercase;display:block;margin-top:-2px;}
    .nav-tabs{display:flex;gap:0;height:100%;}
    .nav-tab{height:100%;padding:0 1.1rem;font-size:12px;font-weight:500;letter-spacing:.04em;color:rgba(255,255,255,.45);border:none;background:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
    .nav-tab:hover{color:rgba(255,255,255,.8);}
    .nav-tab.active{color:#fff;border-bottom-color:var(--accent);}
    .nav-gap{flex:1;}
    .nav-controls{display:flex;align-items:center;gap:10px;}
    .nav-timestamp{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.04em;}
    .nav-btn{font-size:11px;font-weight:500;letter-spacing:.05em;padding:5px 12px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);transition:all .15s;}
    .nav-btn:hover{border-color:var(--accent);color:var(--accent);}
    .nav-btn:disabled{opacity:.35;cursor:not-allowed;}
    .nav-icon-btn{width:30px;height:30px;border:none;background:transparent;color:rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:15px;transition:color .15s;}
    .nav-icon-btn:hover{color:rgba(255,255,255,.8);}

    /* STATS STRIP */
    .stats-strip{background:var(--bg-stats);border-bottom:1px solid rgba(255,255,255,.06);}
    .stats-inner{max-width:1440px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:stretch;gap:0;}
    .stat-item{padding:.75rem 2.5rem .75rem 0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06);margin-right:2.5rem;}
    .stat-item:last-child{border-right:none;}
    .stat-n{font-family:var(--ui);font-size:26px;font-weight:600;line-height:1;color:#fff;letter-spacing:-.02em;}
    .stat-n.hi{color:var(--accent);}
    .stat-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:3px;}

    /* FILTER BAR */
    .filter-bar{position:sticky;top:52px;z-index:150;background:var(--bg-filter);border-bottom:1px solid var(--border);}
    .filter-inner{max-width:1440px;margin:0 auto;padding:.6rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
    .filter-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-lo);flex-shrink:0;}
    .pill-group{display:flex;gap:4px;flex-wrap:wrap;}
    .pill{font-size:11px;font-weight:500;letter-spacing:.03em;padding:4px 11px;border:1px solid var(--border-md);background:transparent;color:var(--text-md);transition:all .15s;white-space:nowrap;}
    .pill:hover{border-color:var(--accent);color:var(--accent);}
    .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .filter-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
    .search-wrap{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--border-md);background:transparent;}
    .search-wrap input{background:none;border:none;outline:none;color:var(--text-hi);font-family:var(--mono);font-size:11px;width:160px;}
    .search-wrap input::placeholder{color:var(--text-lo);}
    .sort-sel{font-family:var(--mono);font-size:11px;padding:5px 8px;background:transparent;border:1px solid var(--border-md);color:var(--text-md);cursor:pointer;outline:none;}
    .layout-toggle{display:flex;gap:2px;margin-left:auto;}
    .layout-btn{width:28px;height:28px;border:1px solid var(--border);background:transparent;color:var(--text-lo);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
    .layout-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .sources-strip{max-width:1440px;margin:0 auto;padding:.4rem 1.5rem;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border);}
    .sources-strip::-webkit-scrollbar{display:none;}
    .src-pill{font-size:10px;font-weight:500;letter-spacing:.04em;padding:2px 8px;border:1px solid var(--border);background:transparent;color:var(--text-lo);white-space:nowrap;cursor:pointer;transition:all .15s;}
    .src-pill.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

    /* MAIN */
    .main{max-width:1440px;margin:0 auto;padding:2rem 1.5rem 4rem;}
    .region-section{margin-bottom:3rem;}
    .region-header{display:flex;align-items:baseline;gap:12px;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
    .region-flag{font-size:16px;}
    .region-name{font-family:var(--ui);font-size:16px;font-weight:600;letter-spacing:.01em;color:var(--text-hi);}
    .region-count{font-family:var(--mono);font-size:11px;color:var(--text-lo);margin-left:auto;}
    .region-live{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-right:5px;animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .sector-heading{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-lo);margin:1.5rem 0 .75rem;display:flex;align-items:center;gap:8px;}
    .sector-heading::after{content:'';flex:1;height:1px;background:var(--border);}

    /* GRID */
    .card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
    .card-grid.g2{grid-template-columns:repeat(2,1fr);}
    .card-grid.g1{grid-template-columns:1fr;background:transparent;gap:0;}

    /* CARD */
    .card{background:var(--bg-card);padding:1.1rem 1.15rem 1rem;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:box-shadow .15s,background .15s;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background .15s;}
    .card:hover{box-shadow:var(--shadow-lift);z-index:1;}
    .card:hover::before{background:var(--accent);}
    .card.featured{grid-column:span 2;}
    .card.featured .card-headline{font-size:18px;line-height:1.35;}
    .card.featured .card-snippet{-webkit-line-clamp:4;}
    .card-top{display:flex;align-items:center;gap:6px;margin-bottom:.6rem;}
    .cat-pill{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;flex-shrink:0;}
    .cat-materials   {background:rgba(217,41,28,.10);color:var(--accent);}
    .cat-aerospace   {background:rgba(24,91,160,.12);color:#185ba0;}
    .cat-motor       {background:rgba(14,26,43,.08); color:var(--text-md);}
    .cat-recycling   {background:rgba(21,107,72,.12);color:#156b48;}
    .cat-construction{background:rgba(133,91,17,.12);color:#855b11;}
    .cat-competitor  {background:rgba(14,26,43,.06); color:var(--text-lo);}
    .cat-oem         {background:rgba(90,50,140,.12);color:#5a328c;}
    [data-theme="light"] .cat-materials   {background:rgba(217,41,28,.14);color:#f07060;}
    [data-theme="light"] .cat-aerospace   {background:rgba(56,139,229,.12);color:#6ab0f5;}
    [data-theme="light"] .cat-motor       {background:rgba(255,255,255,.06);color:#8fa3ba;}
    [data-theme="light"] .cat-recycling   {background:rgba(48,180,130,.12);color:#4ec99a;}
    [data-theme="light"] .cat-construction{background:rgba(200,155,60,.12);color:#c89b3c;}
    [data-theme="light"] .cat-competitor  {background:rgba(255,255,255,.05);color:#8fa3ba;}
    [data-theme="light"] .cat-oem         {background:rgba(160,110,220,.12);color:#b08ae0;}
    .card-time{font-family:var(--mono);font-size:10px;color:var(--text-lo);margin-left:auto;white-space:nowrap;}
    .card-headline{font-family:var(--serif);font-size:14px;font-weight:600;line-height:1.42;color:var(--text-hi);margin-bottom:.45rem;}
    .card-snippet{font-size:12px;line-height:1.6;color:var(--text-md);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.7rem;flex:1;}
    .card-snippet.hidden{display:none;}
    .card-footer{display:flex;align-items:center;gap:6px;margin-top:auto;}
    .src-badge{font-family:var(--mono);font-size:10px;color:var(--text-lo);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50%;}
    .rel-badge{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:1px 6px;flex-shrink:0;}
    .rel-high  {background:var(--accent-dim);color:var(--accent);border:1px solid rgba(217,41,28,.2);}
    .rel-medium{background:rgba(14,26,43,.04);color:var(--text-lo);border:1px solid var(--border);}
    [data-theme="light"] .rel-medium{background:rgba(255,255,255,.04);}
    .via-dot{font-family:var(--mono);font-size:9px;color:var(--text-lo);flex-shrink:0;}
    .read-link{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);margin-left:auto;flex-shrink:0;opacity:0;transition:opacity .15s;}
    .card:hover .read-link{opacity:1;}

    /* STATES */
    .state-box{text-align:center;padding:5rem 1rem;}
    .spinner{width:28px;height:28px;border:2px solid var(--border-md);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .state-text{font-family:var(--mono);font-size:11px;color:var(--text-lo);letter-spacing:.05em;}

    /* SETTINGS */
    .settings-overlay{position:fixed;inset:0;z-index:500;display:none;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);}
    .settings-overlay.open{display:flex;align-items:flex-start;justify-content:flex-end;padding:60px 1.5rem 0;}
    .settings-panel{background:var(--bg-card);border:1px solid var(--border);width:300px;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;box-shadow:var(--shadow-lift);}
    .settings-title{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-hi);}
    .setting-row{display:flex;flex-direction:column;gap:6px;}
    .setting-label{font-size:11px;color:var(--text-md);font-weight:500;}
    .setting-options{display:flex;gap:4px;flex-wrap:wrap;}
    .setting-btn{font-family:var(--mono);font-size:10px;padding:4px 10px;border:1px solid var(--border-md);background:transparent;color:var(--text-md);transition:all .15s;}
    .setting-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .accent-swatches{display:flex;gap:6px;}
    .swatch{width:22px;height:22px;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
    .swatch.active{border-color:#fff;}
    .settings-close{align-self:flex-end;font-size:11px;font-weight:500;color:var(--text-lo);background:none;border:none;letter-spacing:.04em;}

    /* FOOTER */
    footer{border-top:1px solid var(--border);padding:1rem 1.5rem;}
    .footer-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
    .footer-left{font-family:var(--mono);font-size:10px;color:var(--text-lo);letter-spacing:.05em;}
    .footer-links{display:flex;gap:1rem;}
    .footer-links a{font-family:var(--mono);font-size:10px;color:var(--text-lo);transition:color .15s;}
    .footer-links a:hover{color:var(--accent);}

    @media(max-width:900px){.card-grid{grid-template-columns:repeat(2,1fr);}.card.featured{grid-column:span 2;}}
    @media(max-width:600px){.card-grid{grid-template-columns:1fr;background:transparent;gap:0;}.card.featured{grid-column:span 1;}.stats-inner{overflow-x:auto;}}
  </style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="logo">
      <img src="/hrc-logo.jpeg" alt="HRC" style="height:32px;width:auto;object-fit:contain;"/>
      <div>
        <span class="logo-wordmark">Composites</span>
        <span class="logo-sub">Intelligence Hub</span>
      </div>
    </div>

    <nav class="nav-tabs" id="section-tabs">
      <button class="nav-tab active" data-section="feed">Feed</button>
      <button class="nav-tab" data-section="competitors">Companies</button>
      <button class="nav-tab" data-section="oems">OEM Watch</button>
      <button class="nav-tab" data-section="signals">Signals</button>
    </nav>

    <div class="nav-gap"></div>

    <div class="nav-controls">
      <span class="nav-timestamp" id="last-updated">—</span>
      <button class="nav-btn" id="btn-refresh" onclick="loadData()">↻ Refresh</button>
      <button class="nav-icon-btn" onclick="toggleTheme()" title="Toggle theme">◑</button>
      <button class="nav-icon-btn" onclick="toggleSettings()" title="Settings">⚙</button>
    </div>
  </div>
</header>

<div class="stats-strip">
  <div class="stats-inner">
    <div class="stat-item"><span class="stat-n" id="stat-total">—</span><span class="stat-l">Articles</span></div>
    <div class="stat-item"><span class="stat-n hi" id="stat-high">—</span><span class="stat-l">High Relevance</span></div>
    <div class="stat-item"><span class="stat-n" id="stat-companies">—</span><span class="stat-l">Companies</span></div>
    <div class="stat-item"><span class="stat-n" id="stat-sources">—</span><span class="stat-l">Sources</span></div>
    <div class="stat-item"><span class="stat-n">4</span><span class="stat-l">Regions</span></div>
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">Region</span>
    <div class="pill-group" id="region-pills">
      <button class="pill active" data-region="all">All</button>
      <button class="pill" data-region="eu">EU</button>
      <button class="pill" data-region="china">China</button>
      <button class="pill" data-region="usa">USA</button>
      <button class="pill" data-region="global">Global</button>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-label">Sector</span>
    <div class="pill-group" id="sector-pills">
      <button class="pill active" data-sector="all">All</button>
      <button class="pill" data-sector="materials">Materials</button>
      <button class="pill" data-sector="aerospace">Aerospace</button>
      <button class="pill" data-sector="motor">Motor</button>
      <button class="pill" data-sector="recycling">Recycling</button>
      <button class="pill" data-sector="construction">Construction</button>
    </div>
    <div class="filter-sep"></div>
    <div class="search-wrap">
      <span style="color:var(--text-lo);font-size:12px">⌕</span>
      <input type="text" id="search-input" placeholder="Search…" oninput="renderFeed()"/>
    </div>
    <select class="sort-sel" id="sort-sel" onchange="renderFeed()">
      <option value="latest">Latest</option>
      <option value="relevance">High relevance</option>
      <option value="source">By source</option>
    </select>
    <div class="layout-toggle">
      <button class="layout-btn" id="btn-editorial" onclick="setLayout('editorial')" title="Editorial">⊞</button>
      <button class="layout-btn active" id="btn-uniform" onclick="setLayout('uniform')" title="Uniform">⊟</button>
      <button class="layout-btn" id="btn-list" onclick="setLayout('list')" title="List">≡</button>
    </div>
  </div>
  <div class="sources-strip" id="sources-strip"></div>
</div>

<main class="main" id="main">
  <div class="state-box"><div class="spinner"></div><div class="state-text">Loading intelligence feed…</div></div>
</main>

<footer>
  <div class="footer-inner">
    <span class="footer-left">HRC+ Composites Intelligence · Updated daily at 06:00 UTC</span>
    <div class="footer-links">
      <a href="https://www.compositesworld.com" target="_blank" rel="noopener">CompositesWorld</a>
      <a href="https://www.jeccomposites.com" target="_blank" rel="noopener">JEC Group</a>
      <a href="https://evtolinsights.com" target="_blank" rel="noopener">eVTOL Insights</a>
    </div>
  </div>
</footer>

<div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this)toggleSettings()">
  <div class="settings-panel">
    <div class="settings-title">Display Settings</div>
    <div class="setting-row">
      <span class="setting-label">Theme</span>
      <div class="setting-options">
        <button class="setting-btn active" id="btn-dark" onclick="setTheme('dark')">Dark</button>
        <button class="setting-btn" id="btn-light" onclick="setTheme('light')">Light</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Layout</span>
      <div class="setting-options">
        <button class="setting-btn" onclick="setLayout('editorial')">Editorial</button>
        <button class="setting-btn active" onclick="setLayout('uniform')">Uniform</button>
        <button class="setting-btn" onclick="setLayout('list')">List</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Snippets</span>
      <div class="setting-options">
        <button class="setting-btn active" id="snip-on" onclick="setSnippets(true)">Show</button>
        <button class="setting-btn" id="snip-off" onclick="setSnippets(false)">Hide</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Accent colour</span>
      <div class="accent-swatches">
        <div class="swatch active" style="background:#D9291C" onclick="setAccent('#D9291C')" data-c="#D9291C"></div>
        <div class="swatch" style="background:#0f62fe" onclick="setAccent('#0f62fe')" data-c="#0f62fe"></div>
        <div class="swatch" style="background:#198038" onclick="setAccent('#198038')" data-c="#198038"></div>
        <div class="swatch" style="background:#6929c4" onclick="setAccent('#6929c4')" data-c="#6929c4"></div>
        <div class="swatch" style="background:#9e5d26" onclick="setAccent('#9e5d26')" data-c="#9e5d26"></div>
      </div>
    </div>
    <button class="settings-close" onclick="toggleSettings()">Close ✕</button>
  </div>
</div>

<script>
let allArticles=[], allCompetitors=[], allOems=[];
let activeSection='feed', activeRegion='all', activeSector='all';
let activeLayout='uniform', showSnippets=true, activeSource=null;

const SECTOR_META={
  materials:   {label:'Materials',    cls:'cat-materials'},
  aerospace:   {label:'Aerospace',    cls:'cat-aerospace'},
  motor:       {label:'Motor',        cls:'cat-motor'},
  recycling:   {label:'Recycling',    cls:'cat-recycling'},
  construction:{label:'Construction', cls:'cat-construction'},
  competitor:  {label:'Competitor',   cls:'cat-competitor'},
  oem:         {label:'OEM',          cls:'cat-oem'},
};
const REGION_ORDER=['eu','china','usa','global'];
const REGION_META={
  eu:    {label:'Europe',             flag:'🇪🇺'},
  china: {label:'China',              flag:'🇨🇳'},
  usa:   {label:'USA / North America',flag:'🇺🇸'},
  global:{label:'Global',             flag:'🌍'},
};
const SECTOR_ORDER=['materials','aerospace','motor','recycling','construction'];
const HIGH_KW=['carbon fiber','carbon fibre','cfrp','prepreg','jec world','compositesworld','toray','hexcel','solvay','teijin','sgl carbon','composite fuselage','composite wing','wind turbine blade','recycled carbon fiber','thermoplastic composite'];

function relevance(t,s){const tx=(t+' '+(s||'')).toLowerCase();return HIGH_KW.some(k=>tx.includes(k))?'high':'medium';}

function ago(iso){
  const s=(Date.now()-new Date(iso))/1000;
  if(s<3600)return Math.round(s/60)+'m ago';
  if(s<86400)return Math.round(s/3600)+'h ago';
  if(s<604800)return Math.round(s/86400)+'d ago';
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function cardHtml(a,featured){
  const sm=SECTOR_META[a.sector]||SECTOR_META.materials;
  const rel=relevance(a.title,a.summary);
  const snip=(a.summary||'').trim();
  const via=a.via?a.via.toUpperCase():'';
  return `<a class="card${featured?' featured':''}" href="${a.url||'#'}" target="${a.url?'_blank':'_self'}" rel="noopener">
    <div class="card-top">
      <span class="cat-pill ${sm.cls}">${sm.label}</span>
      <span class="card-time">${ago(a.date)}</span>
    </div>
    <div class="card-headline">${a.title}</div>
    ${snip?`<div class="card-snippet${showSnippets?'':' hidden'}">${snip}</div>`:''}
    <div class="card-footer">
      <span class="src-badge">${a.source||''}</span>
      <span class="rel-badge rel-${rel}">${rel==='high'?'High':'Med'}</span>
      ${via?`<span class="via-dot">${via}</span>`:''}
      ${a.url?'<span class="read-link">Read ↗</span>':''}
    </div>
  </a>`;
}

function buildSourcesStrip(arts){
  const counts={};
  arts.forEach(a=>{if(a.source)counts[a.source]=(counts[a.source]||0)+1;});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,20);
  document.getElementById('sources-strip').innerHTML=
    '<span class="filter-label" style="flex-shrink:0">Sources</span>'+
    sorted.map(([src,n])=>`<button class="src-pill${activeSource===src?' active':''}" onclick="filterSource('${src.replace(/'/g,"\\'")}')">${src} <span style="opacity:.5">${n}</span></button>`).join('');
}

function filterSource(src){activeSource=activeSource===src?null:src;renderFeed();buildSourcesStrip(allArticles);}

function updateStats(arts){
  document.getElementById('stat-total').textContent=arts.length;
  document.getElementById('stat-high').textContent=arts.filter(a=>relevance(a.title,a.summary)==='high').length;
  document.getElementById('stat-companies').textContent=allCompetitors.length+allOems.length;
  document.getElementById('stat-sources').textContent=new Set(arts.map(a=>a.source).filter(Boolean)).size;
}

function gridCls(){
  if(activeLayout==='list')return 'card-grid g1';
  return 'card-grid';
}

function renderFeed(){
  if(activeSection!=='feed')return;
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const sort=document.getElementById('sort-sel').value;
  let items=[...allArticles];
  if(activeRegion!=='all')items=items.filter(a=>a.region===activeRegion);
  if(activeSector!=='all')items=items.filter(a=>a.sector===activeSector);
  if(activeSource)items=items.filter(a=>a.source===activeSource);
  if(q)items=items.filter(a=>(a.title+' '+(a.summary||'')+(a.source||'')).toLowerCase().includes(q));
  if(sort==='relevance')items.sort((a,b)=>relevance(b.title,b.summary)==='high'?1:-1);
  else if(sort==='source')items.sort((a,b)=>(a.source||'').localeCompare(b.source||''));
  else items.sort((a,b)=>new Date(b.date)-new Date(a.date));
  updateStats(items);
  const main=document.getElementById('main');
  if(!items.length){main.innerHTML='<div class="state-box"><div class="state-text">No articles match.</div></div>';return;}
  if(activeRegion==='all'&&activeLayout!=='list'){
    let html='';
    REGION_ORDER.forEach(r=>{
      const ri=items.filter(a=>a.region===r);
      if(!ri.length)return;
      const rm=REGION_META[r];
      html+=`<div class="region-section"><div class="region-header"><span class="region-flag">${rm.flag}</span><span class="region-name">${rm.label}</span><span class="region-count"><span class="region-live"></span>${ri.length} articles</span></div>`;
      SECTOR_ORDER.forEach(sec=>{
        const si=ri.filter(a=>a.sector===sec);
        if(!si.length)return;
        html+=`<div class="sector-heading">${SECTOR_META[sec].label}</div><div class="${gridCls()}">`;
        si.forEach((a,i)=>html+=cardHtml(a,activeLayout==='editorial'&&i===0));
        html+='</div>';
      });
      html+='</div>';
    });
    main.innerHTML=html||'<div class="state-box"><div class="state-text">No articles.</div></div>';
  }else{
    main.innerHTML=`<div class="${gridCls()}">${items.map((a,i)=>cardHtml(a,activeLayout==='editorial'&&i===0)).join('')}</div>`;
  }
}

function renderGrouped(items,groupList,keyFn,noMsg){
  if(!items.length){document.getElementById('main').innerHTML=`<div class="state-box"><div class="state-text">${noMsg}</div></div>`;return;}
  const grouped={};
  items.forEach(a=>{const k=groupList.find(g=>keyFn(a,g))||'Other';if(!grouped[k])grouped[k]=[];grouped[k].push(a);});
  let html='';
  Object.entries(grouped).sort((a,b)=>b[1].length-a[1].length).filter(([,v])=>v.length).forEach(([name,arts])=>{
    html+=`<div class="region-section"><div class="region-header"><span class="region-name">${name}</span><span class="region-count">${arts.length} articles</span></div><div class="${gridCls()}">${arts.map(a=>cardHtml(a,false)).join('')}</div></div>`;
  });
  document.getElementById('main').innerHTML=html;
}

const COMP_LIST=['Toray','Hexcel','SGL Carbon','Solvay','Teijin','Cytec','Owens Corning','Mitsubishi Chemical','Chomarat','Saertex','Porcher Industries','Hexion'];
const OEM_LIST=['McLaren','Ferrari','Lamborghini','Bugatti','Pagani','Koenigsegg','Aston Martin','Maserati','Rimac','Pininfarina','Lotus','Dallara','Czinger','Zenvo','SSC North America','Hennessey','Mercedes-AMG','Audi Sport','Alfa Romeo','Lexus','Toyota Gazoo Racing','Nissan Nismo','Cadillac','Polestar','Hyundai N','Jaguar','Range Rover','Rolls-Royce','Bentley','Alpine','KTM','Lucid Motors','Tesla','Dodge SRT','Subaru STI','Mitsubishi Ralliart','Joby Aviation','Lilium','Archer Aviation','Airbus','Boeing','COMAC'];

function renderCompanies(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  let items=[...allCompetitors].filter(a=>!q||(a.title+' '+(a.summary||'')+' '+(a.competitor||'')).toLowerCase().includes(q));
  items.sort((a,b)=>new Date(b.date)-new Date(a.date));
  updateStats(items);
  renderGrouped(items,COMP_LIST,(a,g)=>(a.competitor||'').toLowerCase().includes(g.toLowerCase())||a.title.toLowerCase().includes(g.toLowerCase()),'No competitor news. Refresh to fetch.');
}

function renderOems(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  let items=[...allOems].filter(a=>!q||(a.title+' '+(a.summary||'')+' '+(a.oem||'')).toLowerCase().includes(q));
  items.sort((a,b)=>new Date(b.date)-new Date(a.date));
  updateStats(items);
  renderGrouped(items,OEM_LIST,(a,g)=>(a.oem||'').toLowerCase().includes(g.toLowerCase())||a.title.toLowerCase().includes(g.toLowerCase()),'No OEM news. Refresh to fetch.');
}

function renderSignals(){
  const hi=allArticles.filter(a=>relevance(a.title,a.summary)==='high').slice(0,30);
  updateStats(hi);
  const main=document.getElementById('main');
  if(!hi.length){main.innerHTML='<div class="state-box"><div class="state-text">No high-relevance signals yet.</div></div>';return;}
  main.innerHTML=`<div class="region-header" style="margin-bottom:1.25rem"><span class="region-name">High-Relevance Signals</span><span class="region-count"><span class="region-live"></span>${hi.length} signals today</span></div><div class="${gridCls()}">${hi.map(a=>cardHtml(a,false)).join('')}</div>`;
}

function setSection(sec){
  activeSection=sec;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.section===sec));
  document.getElementById('filter-bar').style.display=sec==='feed'?'':'none';
  render();
}
function render(){
  if(activeSection==='feed')renderFeed();
  else if(activeSection==='competitors')renderCompanies();
  else if(activeSection==='oems')renderOems();
  else if(activeSection==='signals')renderSignals();
}
document.getElementById('region-pills').addEventListener('click',e=>{
  const b=e.target.closest('[data-region]');if(!b)return;
  activeRegion=b.dataset.region;
  document.querySelectorAll('[data-region]').forEach(p=>p.classList.toggle('active',p.dataset.region===activeRegion));
  renderFeed();
});
document.getElementById('sector-pills').addEventListener('click',e=>{
  const b=e.target.closest('[data-sector]');if(!b)return;
  activeSector=b.dataset.sector;
  document.querySelectorAll('[data-sector]').forEach(p=>p.classList.toggle('active',p.dataset.sector===activeSector));
  renderFeed();
});
document.getElementById('section-tabs').addEventListener('click',e=>{
  const b=e.target.closest('[data-section]');if(!b)return;
  setSection(b.dataset.section);
});
function setLayout(l){
  activeLayout=l;
  ['editorial','uniform','list'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===l));
  render();
}
function setSnippets(s){
  showSnippets=s;
  document.getElementById('snip-on').classList.toggle('active',s);
  document.getElementById('snip-off').classList.toggle('active',!s);
  document.querySelectorAll('.card-snippet').forEach(el=>el.classList.toggle('hidden',!s));
}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('btn-dark').classList.toggle('active',t==='dark');
  document.getElementById('btn-light').classList.toggle('active',t==='light');
}
function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
function setAccent(c){
  document.documentElement.style.setProperty('--accent',c);
  document.documentElement.style.setProperty('--accent-dim',c+'20');
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.c===c));
}
function toggleSettings(){document.getElementById('settings-overlay').classList.toggle('open');}

async function loadData(){
  const btn=document.getElementById('btn-refresh');
  btn.disabled=true;btn.textContent='⟳ Fetching…';
  document.getElementById('main').innerHTML='<div class="state-box"><div class="spinner"></div><div class="state-text">Scanning intelligence sources…</div></div>';
  try{
    const res=await fetch('/api/refresh');
    const data=await res.json();
    if(!res.ok||!data.articles)throw new Error(data.error||'Failed');
    allArticles=(data.articles||[]).filter(a=>a.title&&a.title.length>5);
    allCompetitors=(data.competitors||[]).filter(a=>a.title&&a.title.length>5);
    allOems=(data.oems||[]).filter(a=>a.title&&a.title.length>5);
    const d=new Date(data.fetchedAt);
    document.getElementById('last-updated').textContent=
      d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+
      d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' UTC';
    buildSourcesStrip(allArticles);
    render();
  }catch(err){
    document.getElementById('main').innerHTML=`<div class="state-box"><div class="state-text" style="color:var(--accent)">Error: ${err.message}</div></div>`;
  }finally{
    btn.disabled=false;btn.textContent='↻ Refresh';
  }
}
loadData();
</script>
</body>
</html>
