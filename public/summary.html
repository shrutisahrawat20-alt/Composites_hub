<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Digest — Composites Industry Hub</title>
  <meta name="description" content="Daily summary of composites and carbon fiber industry news, grouped by sector." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0f;
      --bg2:     #141417;
      --bg3:     #1b1b1f;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text:    #edece7;
      --muted:   rgba(237,236,231,0.42);
      --accent:  #c8ff00;
      --font-display: 'Syne', sans-serif;
      --font-serif:   'DM Serif Display', serif;
      --font-mono:    'DM Mono', monospace;
      --font-sans:    system-ui, -apple-system, sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,0.92); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: 900px; margin: 0 auto; padding: 0 1.5rem;
      height: 54px; display: flex; align-items: center; gap: 12px;
    }
    .logo { font-family: var(--font-display); font-size: 13px; font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 7px; }
    .logo-pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 2.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .topbar-gap { flex: 1; }
    .nav-link {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .07em;
      text-transform: uppercase; color: var(--muted); text-decoration: none;
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px;
      transition: all .2s;
    }
    .nav-link:hover, .nav-link.active { border-color: var(--accent); color: var(--accent); }
    .btn-refresh {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .07em;
      text-transform: uppercase; padding: 6px 14px;
      border: 1px solid var(--border2); border-radius: 20px;
      background: transparent; color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .btn-refresh:disabled { opacity: .35; cursor: not-allowed; }

    /* PAGE HEADER */
    .page-header {
      max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .page-eyebrow {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
    }
    .page-title {
      font-family: var(--font-display); font-size: clamp(28px, 4vw, 44px);
      font-weight: 800; line-height: 1.05; letter-spacing: -.02em;
    }
    .page-title em { font-style: normal; color: var(--accent); }
    .page-meta {
      margin-top: 10px; font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap;
    }
    .meta-dot { color: var(--accent); margin-right: 5px; }

    /* CONTROLS */
    .digest-controls {
      max-width: 900px; margin: 0 auto; padding: .9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .filter-btn {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .07em;
      text-transform: uppercase; padding: 5px 12px; border-radius: 20px;
      border: 1px solid transparent; background: transparent;
      color: var(--muted); cursor: pointer; transition: all .18s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--border2); }
    .filter-btn.active { background: rgba(200,255,0,.10); border-color: var(--accent); color: var(--accent); }
    .controls-gap { flex: 1; }
    .print-btn {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .07em;
      text-transform: uppercase; padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .18s;
    }
    .print-btn:hover { border-color: var(--border2); color: var(--text); }

    /* DIGEST BODY */
    .digest-body { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* SECTION */
    .digest-section { margin-bottom: 3rem; }
    .section-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 1.25rem; padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }
    .section-stripe { width: 3px; height: 22px; border-radius: 2px; flex-shrink: 0; }
    .section-title {
      font-family: var(--font-display); font-size: 18px; font-weight: 800;
      letter-spacing: -.01em;
    }
    .section-count {
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      letter-spacing: .07em; margin-left: auto;
    }

    /* ARTICLE ROW */
    .article-row {
      display: grid; grid-template-columns: 1fr;
      gap: 0;
    }
    .article-item {
      padding: 1rem 0 1rem 1rem;
      border-left: 1px solid var(--border);
      margin-bottom: .75rem;
      transition: border-color .2s;
    }
    .article-item:hover { border-left-color: var(--border2); }
    .article-item:last-child { margin-bottom: 0; }

    .article-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin-bottom: 6px;
    }
    .article-title {
      font-size: 14px; font-weight: 500; line-height: 1.45;
      color: var(--text); text-decoration: none;
      flex: 1;
    }
    .article-title:hover { color: var(--accent); }
    .article-ago {
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      flex-shrink: 0; padding-top: 2px;
    }
    .article-summary {
      font-size: 13px; color: var(--muted); line-height: 1.65;
      margin-bottom: 8px;
    }
    .article-footer {
      display: flex; align-items: center; gap: 10px;
    }
    .article-source {
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
    }
    .article-readlink {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .05em;
      text-transform: uppercase; color: var(--muted); text-decoration: none;
      transition: color .15s;
    }
    .article-readlink:hover { color: var(--accent); }

    /* STRIPE COLOURS */
    .s-carbon      { background: #7F77DD; }
    .s-aerospace   { background: #378ADD; }
    .s-automotive  { background: #639922; }
    .s-construction{ background: #BA7517; }
    .s-market      { background: #D85A30; }

    /* LOADING / EMPTY */
    .state-box { text-align: center; padding: 5rem 1rem; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .75s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-text { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 1.5rem; }
    .footer-inner {
      max-width: 900px; margin: 0 auto;
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      letter-spacing: .05em; display: flex; gap: 1rem;
      align-items: center; justify-content: center; flex-wrap: wrap;
    }
    .footer-inner a { color: var(--muted); text-decoration: none; }
    .footer-inner a:hover { color: var(--accent); }

    /* PRINT */
    @media print {
      body { background: #fff; color: #000; }
      .topbar, .digest-controls, .btn-refresh, .print-btn, footer { display: none; }
      .article-title { color: #000; }
      .article-summary { color: #444; }
      .page-title em { color: #000; }
      .section-title { color: #000; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="logo" href="/"><span class="logo-pip"></span>COMPOSITES HUB</a>
    <div class="topbar-gap"></div>
    <a class="nav-link" href="/">News Feed</a>
    <a class="nav-link active" href="/summary.html">Daily Digest</a>
    <button class="btn-refresh" id="btn-refresh" onclick="load()">↻ Refresh</button>
  </div>
</header>

<div class="page-header">
  <div class="page-eyebrow">Daily Digest</div>
  <h1 class="page-title">Today's <em>Composites</em> Briefing</h1>
  <div class="page-meta">
    <span><span class="meta-dot">●</span><span id="meta-date">—</span></span>
    <span><span class="meta-dot">●</span><span id="meta-count">—</span> articles</span>
    <span><span class="meta-dot">●</span>Updated <span id="meta-updated">—</span></span>
  </div>
</div>

<div class="digest-controls">
  <button class="filter-btn active" data-cat="all">All sectors</button>
  <button class="filter-btn" data-cat="carbon">Carbon Fiber</button>
  <button class="filter-btn" data-cat="aerospace">Aerospace</button>
  <button class="filter-btn" data-cat="automotive">Automotive</button>
  <button class="filter-btn" data-cat="construction">Construction</button>
  <button class="filter-btn" data-cat="market">Market &amp; Players</button>
  <div class="controls-gap"></div>
  <button class="print-btn" onclick="window.print()">⎙ Print / Save PDF</button>
</div>

<main class="digest-body" id="digest-body">
  <div class="state-box">
    <div class="spinner"></div>
    <div class="state-text">Loading today's digest…</div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <span>Composites Industry Hub</span>
    <span>·</span><span>Daily Digest</span>
    <span>·</span><a href="/">← Back to news feed</a>
  </div>
</footer>

<script>
  const CATS = {
    carbon:       { label: 'Carbon Fiber',   stripe: 's-carbon' },
    aerospace:    { label: 'Aerospace',      stripe: 's-aerospace' },
    automotive:   { label: 'Automotive',     stripe: 's-automotive' },
    construction: { label: 'Construction',   stripe: 's-construction' },
    market:       { label: 'Market & Players', stripe: 's-market' },
  };
  const CAT_ORDER = ['carbon','aerospace','automotive','construction','market'];

  let allArticles = [];
  let activeCat   = 'all';

  document.querySelector('.digest-controls').addEventListener('click', e => {
    const b = e.target.closest('[data-cat]');
    if (!b) return;
    activeCat = b.dataset.cat;
    document.querySelectorAll('.filter-btn').forEach(f => f.classList.remove('active'));
    b.classList.add('active');
    render();
  });

  function ago(iso) {
    const s = (Date.now() - new Date(iso)) / 1000;
    if (s < 3600)   return Math.round(s/60)    + 'm ago';
    if (s < 86400)  return Math.round(s/3600)  + 'h ago';
    if (s < 604800) return Math.round(s/86400) + 'd ago';
    return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }

  function render() {
    const body = document.getElementById('digest-body');
    let articles = [...allArticles];
    if (activeCat !== 'all') articles = articles.filter(a => a.category === activeCat);

    if (!articles.length) {
      body.innerHTML = '<div class="state-box"><div class="state-text">No articles found.</div></div>';
      return;
    }

    // Group by category in defined order
    const grouped = {};
    CAT_ORDER.forEach(c => { grouped[c] = []; });
    articles.forEach(a => {
      const c = CAT_ORDER.includes(a.category) ? a.category : 'carbon';
      grouped[c].push(a);
    });

    const sections = CAT_ORDER
      .filter(c => grouped[c].length > 0 && (activeCat === 'all' || activeCat === c))
      .map(c => {
        const meta = CATS[c];
        const items = grouped[c].map(a => `
          <div class="article-item">
            <div class="article-top">
              <a class="article-title" href="${a.url||'#'}" target="_blank" rel="noopener">${a.title}</a>
              <span class="article-ago">${ago(a.date)}</span>
            </div>
            ${a.summary ? `<p class="article-summary">${a.summary}</p>` : ''}
            <div class="article-footer">
              <span class="article-source">${a.source||''}</span>
              ${a.url ? `<a class="article-readlink" href="${a.url}" target="_blank" rel="noopener">Read full article ↗</a>` : ''}
            </div>
          </div>`).join('');

        return `
          <div class="digest-section" data-cat="${c}">
            <div class="section-header">
              <div class="section-stripe ${meta.stripe}"></div>
              <div class="section-title">${meta.label}</div>
              <div class="section-count">${grouped[c].length} articles</div>
            </div>
            <div class="article-row">${items}</div>
          </div>`;
      }).join('');

    body.innerHTML = sections;
    document.getElementById('meta-count').textContent = articles.length;
  }

  async function load() {
    const btn = document.getElementById('btn-refresh');
    btn.disabled = true; btn.textContent = '⟳ Loading…';
    document.getElementById('digest-body').innerHTML =
      '<div class="state-box"><div class="spinner"></div><div class="state-text">Fetching latest articles…</div></div>';
    try {
      const res  = await fetch('/api/refresh');
      const data = await res.json();
      if (!res.ok || !data.articles) throw new Error(data.error || 'Failed');

      allArticles = data.articles;
      allArticles.sort((a,b) => new Date(b.date) - new Date(a.date));

      const d = new Date(data.fetchedAt);
      document.getElementById('meta-date').textContent =
        d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
      document.getElementById('meta-updated').textContent =
        d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' UTC';

      render();
    } catch(err) {
      document.getElementById('digest-body').innerHTML =
        `<div class="state-box"><div class="state-text" style="color:#F0997B">Error: ${err.message}</div></div>`;
    } finally {
      btn.disabled = false; btn.textContent = '↻ Refresh';
    }
  }

  load();
</script>
</body>
</html>
